services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: landchg
      POSTGRES_USER: landchg
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./laravel:/var/www/html
      - /home/kiang/public_html/landchg.tcd.gov.tw:/data:ro
    depends_on:
      - db

  web:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./laravel:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  pgdata:
